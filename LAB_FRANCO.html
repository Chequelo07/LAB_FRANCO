function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

    // OPERADORES

    // TABLAS

    { question: "Si pâ†’q y q es falso:", options: ["p V","p F","No se sabe"], answer: "p F" },
    { question: "Si pâ†’q, qâ†’r y p:", options: ["r","Â¬r","No se sabe"], answer: "r" },
    { question: "pâˆ¨q es V y p es F:", options: ["q V","q F","No se sabe"], answer: "q V" },

    // NEGACIONES
    { question: "Â¬(p âˆ¨ q) =", options: ["Â¬pâˆ§Â¬q","Â¬pâˆ¨Â¬q","pâˆ§q"], answer: "Â¬pâˆ§Â¬q" },

    { question: "p âˆ§ (p âˆ¨ q) =", options: ["p","q","pâˆ§q"], answer: "p" },
    { question: "Ley de Â¬(pâˆ§q)", options: ["De Morgan","AbsorciÃ³n","Idempotencia"], answer: "De Morgan" },
    { question: "p âˆ¨ p =", options: ["Idempotencia","De Morgan","AbsorciÃ³n"], answer: "Idempotencia" },

    // DISTRIBUTIVA

    { question: "p âˆ¨ (q âˆ§ r) =", options: ["(pâˆ¨q)âˆ§(pâˆ¨r)","(pâˆ§q)âˆ¨r","pâˆ§(qâˆ¨r)"], answer: "(pâˆ¨q)âˆ§(pâˆ¨r)" },

    { question: "Si estudio â†’ apruebo. No apruebo:", options: ["No estudiÃ©","EstudiÃ©","No se sabe"], answer: "No estudiÃ©" },
    { question: "Si hay humo â†’ fuego. Hay humo:", options: ["Hay fuego","No hay fuego","No se concluye"], answer: "No se concluye" },
    { question: "Si llueve â†’ paraguas. No llueve:", options: ["Paraguas","No paraguas","No se concluye"], answer: "No se concluye" },

    // VERDADERO/FALSO
    { question: "Â¬(Â¬p)=p", options: ["Verdadero","Falso"], answer: "Verdadero" },
    { question: "(pâ†’q) â‰¡ (Â¬pâˆ¨q)", options: ["Verdadero","Falso"], answer: "Verdadero" },

    // NIVEL ALTO
    { question: "(pâ†’q) âˆ§ p con p falso:", options: ["Siempre V","Siempre F","Depende"], answer: "Siempre F" },
    { question: "(pâˆ§q) si p es F:", options: ["Siempre F","Siempre V","Depende"], answer: "Siempre F" },
    { question: "(pâˆ¨q) si p es V:", options: ["Siempre V","Siempre F","Depende"], answer: "Siempre V" },
    { question: "Â¬(pâ†”q) =", options: ["pâŠ•q","pâˆ§q","Â¬pâˆ§Â¬q"], answer: "pâŠ•q" }

]);

let current = 0;
let score = 0;

function loadQuestion() {
    const quiz = document.getElementById("quiz");
    quiz.innerHTML = "";

    if (current >= questions.length) {
        document.getElementById("score").innerText =
            "ðŸŽ¯ Puntaje final: " + score + " / " + questions.length;
        return;
    }

    const q = questions[current];

    const questionEl = document.createElement("div");
    questionEl.className = "question";
    questionEl.innerText = q.question;
    quiz.appendChild(questionEl);

    q.options.forEach(option => {
        const btn = document.createElement("button");
        btn.innerText = option;

        btn.onclick = () => {
            if (option === q.answer) {
                btn.classList.add("correct");
                score++;
            } else {
                btn.classList.add("wrong");
            }

            setTimeout(() => {
                current++;
                loadQuestion();
            }, 700);
        };

        quiz.appendChild(btn);
    });
}

loadQuestion();

</script>
